<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校数学 CBTテスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>高校数学 計算演習</h1>
        <p>挑戦したい単元を選んでください。（各10問ランダム出題、6択形式）</p>
        
        <div class="subject-list">
            
            <details class="subject-folder" open> <summary>数学I：2次関数</summary>
                <div class="unit-grid">
                    <button onclick="location.href='quiz.html?unit=math1_quad_graph'">グラフと頂点</button>
                    <button onclick="location.href='quiz.html?unit=math1_quad_maxmin'">最大・最小</button>
                    <button onclick="location.href='quiz.html?unit=math1_quad_eq'">2次方程式・不等式</button>
                </div>
            </details>

            <details class="subject-folder">
                <summary>数学A：確率</summary>
                <div class="unit-grid">
                    <button onclick="location.href='quiz.html?unit=mathA_prob_basic'">確率の基本</button>
                    <button onclick="location.href='quiz.html?unit=mathA_prob_cond'">条件付き確率</button>
                </div>
            </details>

            <details class="subject-folder">
                <summary>数学B/C：ベクトル</summary>
                <div class="unit-grid">
                    <button onclick="location.href='quiz.html?unit=mathB_vector_plane'">平面ベクトル</button>
                    <button onclick="location.href='quiz.html?unit=mathB_vector_space'">空間ベクトル</button>
                </div>
            </details>

            </div>
    </div>
</body>
</html>
